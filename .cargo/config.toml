# Use a single target dir at repo root so `cargo test --manifest-path src-tauri\Cargo.toml`
# and Tauri builds share the same artifacts. No need to set CARGO_TARGET_DIR.
[build]
target-dir = ".cargo-target"

[env]
LIBCLANG_PATH = "C:\\Program Files\\LLVM\\bin"
CMAKE = "C:\\Program Files\\CMake\\bin\\cmake.exe"

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CMake
        run: choco install cmake --version=3.31.7 --installargs 'ADD_CMAKE_TO_PATH=System' -y --allow-downgrade

      - name: Install LLVM/Clang
        run: choco install llvm -y --no-progress

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.9.1'
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev"]'

      - name: Install Vulkan SDK
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe"
          Invoke-WebRequest -Uri $url -OutFile vulkan-sdk.exe
          Start-Process -FilePath vulkan-sdk.exe -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\$(Get-ChildItem 'C:\VulkanSDK' | Sort-Object Name | Select-Object -Last 1 -ExpandProperty Name)" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2.8.2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json

      - name: Enable GPU features for release build
        shell: bash
        run: |
          sed -i 's/whisper-rs = "0\.15\.1"/whisper-rs = { version = "0.15.1", features = ["cuda", "vulkan"] }/' src-tauri/Cargo.toml

      - name: Add CUDA to PATH and set compiler
        shell: pwsh
        run: |
          $cudaBin = "$env:CUDA_PATH\bin"
          echo "$cudaBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "CMAKE_CUDA_COMPILER=$cudaBin\nvcc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build
        env:
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
          LLVM_CONFIG_PATH: C:\Program Files\LLVM\bin\llvm-config.exe
        run: npm run tauri build

      - name: Upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .cargo-target/release/bundle/nsis/*.exe
            .cargo-target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

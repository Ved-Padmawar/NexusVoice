name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TARGET_DIR: C:\b

jobs:
  build:
    name: Build (${{ matrix.variant }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            cuda: false
          - variant: cuda
            cuda: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CUDA Toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.9.1'
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "visual_studio_integration"]'

      - name: Add CUDA to PATH
        if: matrix.cuda
        shell: pwsh
        run: echo "$env:CUDA_PATH\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Vulkan SDK
        if: "!matrix.cuda"
        shell: pwsh
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe"
          $installer = "$env:TEMP\vulkan-sdk.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          $sdkPath = (Get-ChildItem "C:\VulkanSDK" | Sort-Object Name -Descending | Select-Object -First 1).FullName
          echo "VULKAN_SDK=$sdkPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "$sdkPath\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install npm deps
        run: npm ci

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json

      - name: Copy CUDA DLLs
        if: matrix.cuda
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/cuda
          Copy-Item "$env:CUDA_PATH\bin\cublas64_12.dll"   src-tauri/cuda/
          Copy-Item "$env:CUDA_PATH\bin\cublasLt64_12.dll" src-tauri/cuda/
          Copy-Item "$env:CUDA_PATH\bin\cudart64_12.dll"   src-tauri/cuda/

      - name: Patch tauri.conf.json resources with CUDA DLLs
        if: matrix.cuda
        shell: python
        run: |
          import json, pathlib
          conf_path = pathlib.Path("src-tauri/tauri.conf.json")
          conf = json.loads(conf_path.read_text(encoding="utf-8"))
          cuda_entries = {
              "cuda/cublas64_12.dll": "cublas64_12.dll",
              "cuda/cublasLt64_12.dll": "cublasLt64_12.dll",
              "cuda/cudart64_12.dll": "cudart64_12.dll",
          }
          resources = conf["bundle"]["resources"]
          if isinstance(resources, list):
              resources = {}
          resources.update(cuda_entries)
          conf["bundle"]["resources"] = resources
          conf_path.write_text(json.dumps(conf, indent=2), encoding="utf-8")
          print("patched tauri.conf.json resources")

      - name: Patch installer name for CUDA build
        if: matrix.cuda
        shell: python
        run: |
          import json, pathlib
          conf_path = pathlib.Path("src-tauri/tauri.conf.json")
          conf = json.loads(conf_path.read_text(encoding="utf-8"))
          conf["productName"] = "NexusVoice-CUDA"
          conf_path.write_text(json.dumps(conf, indent=2), encoding="utf-8")
          print("patched productName to NexusVoice-CUDA")

      - name: Enable whisper-rs GPU features in Cargo.toml
        shell: python
        run: |
          import pathlib, re
          cuda = "${{ matrix.cuda }}" == "true"
          cargo = pathlib.Path("src-tauri/Cargo.toml")
          text = cargo.read_text(encoding="utf-8")
          features = '"cuda"' if cuda else '"vulkan"'
          text = re.sub(
              r'whisper-rs\s*=\s*"([^"]+)"',
              f'whisper-rs = {{ version = "\\1", features = [{features}] }}',
              text,
          )
          cargo.write_text(text, encoding="utf-8")
          print(f"enabled features: {features}")

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2.8.2
        with:
          workspaces: src-tauri
          cache-targets: false

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Generate latest.json
        if: matrix.variant == 'standard'
        shell: python
        run: |
          import json, os, glob, datetime, pathlib
          version = os.environ["GITHUB_REF_NAME"].lstrip("v")
          tag = os.environ["GITHUB_REF_NAME"]
          repo = "Ved-Padmawar/NexusVoice"
          base = f"https://github.com/{repo}/releases/download/{tag}"
          exe = pathlib.Path(glob.glob("C:/b/release/bundle/nsis/*.exe")[0]).name
          sig = pathlib.Path(glob.glob("C:/b/release/bundle/nsis/*.exe.sig")[0]).read_text().strip()
          pub_date = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          payload = {
            "version": version,
            "notes": f"NexusVoice {version}",
            "pub_date": pub_date,
            "platforms": {
              "windows-x86_64": {
                "signature": sig,
                "url": f"{base}/{exe}"
              }
            }
          }
          pathlib.Path("latest.json").write_text(json.dumps(payload, indent=2))

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
          files: |
            C:/b/release/bundle/nsis/*.exe
            C:/b/release/bundle/msi/*.msi
            ${{ matrix.variant == 'standard' && 'latest.json' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Install LLVM/Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: '17'

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/\"version\": \"0\.0\.0\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \"0\.0\.0\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          sed -i "s/\"version\": \"0\.0\.0\"/\"version\": \"$VERSION\"/" package.json

      - name: Build
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
        run: npm run tauri build

      - name: Upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .cargo-target/release/bundle/nsis/*.exe
            .cargo-target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

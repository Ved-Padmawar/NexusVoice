name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # Short target dir to avoid Windows MAX_PATH (260 char) limit.
  # whisper-rs-sys vulkan-shaders-gen creates deeply nested CMake paths.
  CARGO_TARGET_DIR: C:\b

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # CMake 3.31.x is pre-installed on windows-latest. No install needed.
      # LLVM/Clang 20.x is pre-installed on windows-latest. No install needed.

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.9.1'
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "visual_studio_integration"]'

      - name: Install Vulkan SDK
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe"
          Invoke-WebRequest -Uri $url -OutFile vulkan-sdk.exe
          Start-Process -FilePath vulkan-sdk.exe -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\$(Get-ChildItem 'C:\VulkanSDK' | Sort-Object Name | Select-Object -Last 1 -ExpandProperty Name)" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Add CUDA to PATH
        shell: pwsh
        run: |
          echo "$env:CUDA_PATH\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2.8.2
        with:
          workspaces: src-tauri
          cache-targets: false

      - name: Install npm deps
        run: npm ci

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json

      - name: Enable GPU features for release build
        shell: bash
        run: |
          sed -i 's/whisper-rs = "0\.15\.1"/whisper-rs = { version = "0.15.1", features = ["cuda", "vulkan"] }/' src-tauri/Cargo.toml

      - name: Build
        env:
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
        run: npm run tauri build

      - name: Upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: |
            C:\b\release\bundle\nsis\*.exe
            C:\b\release\bundle\msi\*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

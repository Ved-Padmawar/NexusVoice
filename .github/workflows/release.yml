name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TARGET_DIR: C:\b

jobs:
  build:
    name: Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.9.1'
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "visual_studio_integration"]'

      - name: Add CUDA to PATH
        shell: pwsh
        run: echo "$env:CUDA_PATH\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install npm deps
        run: npm ci

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2.8.2
        with:
          workspaces: src-tauri
          cache-targets: false

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build -- --features cuda

      - name: Generate latest.json
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NSIS_EXE=$(basename C:/b/release/bundle/nsis/*.exe)
          NSIS_SIG=$(cat C:/b/release/bundle/nsis/*.exe.sig)
          REPO="Ved-Padmawar/NexusVoice"
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          cat > latest.json <<ENDJSON
          {
            "version": "${VERSION}",
            "notes": "NexusVoice ${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${NSIS_SIG}",
                "url": "${BASE}/${NSIS_EXE}"
              }
            }
          }
          ENDJSON

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            C:/b/release/bundle/nsis/*.exe
            C:/b/release/bundle/nsis/*.exe.sig
            C:/b/release/bundle/msi/*.msi
            C:/b/release/bundle/msi/*.msi.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
